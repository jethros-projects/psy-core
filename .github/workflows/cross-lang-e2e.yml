name: Cross-language E2E (Python ⇄ Node)

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'python/**'
      - 'src/**'
      - 'package.json'
      - 'tests/**'
      - '.github/workflows/cross-lang-e2e.yml'

jobs:
  e2e:
    name: ingest round-trip
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install psy-core (npm)
        run: |
          npm install
          npm run build
          # Use tsx-driven invocation as the e2e binary so we don't depend on
          # publishing to npm. The Python side resolves `psy` on PATH first.
          mkdir -p .bin
          cat > .bin/psy <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          ROOT="$(cd "$(dirname "$0")/.." && pwd)"
          exec node "$ROOT/dist/cli.js" "$@"
          EOF
          chmod +x .bin/psy
          echo "$PWD/.bin" >> "$GITHUB_PATH"
      - name: install psy-hermes (pip)
        working-directory: python/psy-hermes
        run: |
          pip install uv
          uv venv
          uv pip install -e ".[dev]"
      - name: psy init (creates fresh .psy.json + seal key)
        run: ./.bin/psy init --no-color
      - name: feed envelopes through ingest
        run: |
          cat <<'EOF' | ./.bin/psy ingest --no-startup
          {"type":"intent","operation":"create","call_id":"e2e-1","identity":{"actor_id":"alice","tenant_id":"acme","session_id":"s1"},"memory_path":"/memories/MEMORY.md","payload":{"content":"hello"}}
          {"type":"result","operation":"create","call_id":"e2e-1","identity":{"actor_id":"alice","tenant_id":"acme","session_id":"s1"},"memory_path":"/memories/MEMORY.md","payload":{"ok":true}}
          {"type":"intent","operation":"str_replace","call_id":"e2e-2","identity":{"actor_id":"alice","tenant_id":"acme","session_id":"s1"},"memory_path":"/memories/USER.md","payload":{"content":"world"}}
          {"type":"result","operation":"str_replace","call_id":"e2e-2","identity":{"actor_id":"alice","tenant_id":"acme","session_id":"s1"},"memory_path":"/memories/USER.md","payload":{"ok":true}}
          EOF
      - name: psy verify (chain integrity)
        run: ./.bin/psy verify --no-color
      - name: assert envelopes appear in DB
        run: |
          rows="$(./.bin/psy query --actor alice --json | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          if [ "$rows" -ne 4 ]; then
            echo "expected 4 rows, got $rows" >&2
            exit 1
          fi
      - name: psy-hermes can run dry-run end-to-end
        working-directory: python/psy-hermes
        run: |
          echo '{"type":"intent","operation":"create","call_id":"py-1"}' | .venv/bin/psy-hermes dry-run

      # Live integration test: install hermes-agent from upstream, drive
      # plugin discovery + hook invocation through the real PluginManager,
      # then assert the captured envelopes have the right shape.
      - name: clone hermes-agent (real plugin host)
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          path: hermes-agent
          ref: v0.11.0
      - name: install hermes-agent without runtime deps
        working-directory: python/psy-hermes
        run: |
          # We don't need anthropic/openai/etc. — only the plugin manager.
          .venv/bin/pip install ../../hermes-agent --no-deps
      - name: drive real Hermes plugin discovery + hook invocation
        working-directory: python/psy-hermes
        run: |
          .venv/bin/python <<'PY'
          import os, tempfile, textwrap
          from pathlib import Path
          tmp = Path(tempfile.mkdtemp(prefix='live-'))
          os.environ['HERMES_HOME'] = str(tmp)
          (tmp / 'config.yaml').write_text(textwrap.dedent('''
          plugins:
            enabled: [psy]
            psy:
              enabled: true
              actor_id: alice@acme.com
              tenant_id: acme
              psy_binary: /bin/echo
          '''))
          from hermes_cli import plugins as hp
          mgr = hp.get_plugin_manager()
          mgr.discover_and_load()
          loaded = mgr._plugins.get('psy')
          assert loaded and loaded.enabled, f'psy did not load cleanly: {loaded.error if loaded else "missing"}'
          assert 'pre_tool_call' in mgr._hooks
          assert 'post_tool_call' in mgr._hooks
          # Replace ingest with a fake so we don't spawn `psy` here.
          from psy_hermes.hooks import HookHandlers
          handlers = next(fn.__self__ for fn in mgr._hooks['pre_tool_call']
                          if hasattr(fn, '__self__') and isinstance(fn.__self__, HookHandlers))
          captured = []
          class FakeIngest:
              def send(self, e): captured.append(e); return True
              def close(self): pass
          handlers.ingest = FakeIngest()
          hp.invoke_hook('pre_tool_call', tool_name='memory',
                         args={'action':'add','target':'user','content':'x'},
                         tool_call_id='c1', session_id='s1')
          hp.invoke_hook('pre_tool_call', tool_name='skill_manage',
                         args={'action':'patch','name':'demo','old_string':'a','new_string':'b'},
                         tool_call_id='c2', session_id='s1')
          hp.invoke_hook('post_tool_call', tool_name='skill_manage',
                         args={'action':'patch','name':'demo','old_string':'a','new_string':'b'},
                         tool_call_id='c2', session_id='s1', result='patched')
          assert len(captured) == 3, captured
          assert captured[0]['memory_path'] == '/memories/USER.md'
          assert captured[1]['memory_path'] == '/skills/demo/SKILL.md'
          assert captured[1]['operation'] == 'str_replace'
          assert captured[2]['type'] == 'result'
          print('OK: live integration test passed against hermes-agent v0.11.0')
          PY
