name: Publish psy-core-hermes

on:
  push:
    tags:
      - 'psy-core-hermes-v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/psy-core-hermes
    defaults:
      run:
        working-directory: python/psy-core-hermes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Verify tag matches pyproject version
        run: |
          PKG_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          pyproject_version = data["project"]["version"]

          namespace = {}
          exec(Path("src/psy_core/hermes/_version.py").read_text(), namespace)
          constant_version = namespace["PSY_CORE_HERMES_VERSION"]
          if pyproject_version != constant_version:
              raise SystemExit(
                  "pyproject.toml version "
                  f"{pyproject_version} does not match "
                  f"PSY_CORE_HERMES_VERSION {constant_version}"
              )

          print(pyproject_version)
          PY
          )
          TAG_VERSION="${GITHUB_REF_NAME#psy-core-hermes-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag psy-core-hermes-v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing psy-core-hermes@$PKG_VERSION"

      - name: Install test dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: .venv/bin/ruff check src tests

      - name: Mypy
        run: .venv/bin/mypy src

      - name: Pytest
        run: .venv/bin/pytest -q

      - name: Build distributions
        run: uv build

      - name: Publish with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/psy-core-hermes/dist
