name: Publish psy-core-openclaw

on:
  push:
    tags:
      - 'psy-core-openclaw-v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish OpenClaw plugin to npm
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: plugins/psy-core-openclaw
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          path: openclaw-official

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#psy-core-openclaw-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag psy-core-openclaw-v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing psy-core-openclaw@$PKG_VERSION"

      - name: Run package tests
        run: npm test
        env:
          OPENCLAW_REPO: ${{ github.workspace }}/openclaw-official

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
